name: Purview Scan

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  id-token: write
  # To comment on a commit this needs to be contents: write
  contents: read
  pull-requests: write
  actions: read

jobs:
  scan:
    # If section makes the workflow run only on the default branch when workflow is present in the repo directly rather than using rulesets.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)) ||
      (github.event_name == 'pull_request' && github.event.pull_request.base.ref == github.event.repository.default_branch)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Purview GitHub Action
        uses: microsoft/PurviewIntegrations@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Required
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}

          # Authentication (omit to use GitHub OIDC federated credentials)
          client-certificate: ${{ secrets.AZURE_CLIENT_CERTIFICATE }}
          # client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}  # Use instead of client-certificate for secret-based auth

          # User mapping
          users-json-path: 'users.json'

          # File scanning
          file-patterns: '**'
          exclude-patterns: '**/.git/**'

          # First-run state tracking
          state-repo-token: ${{ secrets.STATE_REPO_TOKEN }}
          state-repo-branch: 'workflow'

          # Debugging
          debug: true
