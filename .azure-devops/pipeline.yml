trigger:
  branches:
    include:
      - main

resources:
  repositories:
    - repository: M365GPT
      type: git
      name: 1ESPipelineTemplates/M365GPT
      ref: refs/tags/release

extends:
  template: v1/M365.Official.PipelineTemplate.yml@M365GPT
  parameters:
    pool:
      name: Azure-Pipelines-1ESPT-ExDShared
      image: windows-latest
      os: windows

    stages:
      - stage: Test
        displayName: 'Test Stage'
        jobs:
          - job: RunTests
            displayName: 'Run Tests'
            steps:
              - checkout: self
                clean: true

              - task: UseNode@1
                inputs:
                  versionSpec: '24.x'
                displayName: Use Node.js 24

              - script: npm ci --include=dev --no-audit --no-fund
                displayName: Install dependencies
                env:
                  CI: 'true'
                  HUSKY: '0'
                  NODE_ENV: development
                  NPM_CONFIG_PRODUCTION: 'false'

              - script: |
                  npm run build
                  npm test -- --runInBand
                displayName: Build and run tests
                env:
                  CI: 'true'
