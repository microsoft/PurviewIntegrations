resources:
  repositories:
    - repository: M365GPT
      type: git
      name: refs/tags/release

extends:
  template: v1/M365.Official.PipelineTemplate.yml@M365GPT

trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - '*'

pool:
  vmImage: ubuntu-latest

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '20.x'
    displayName: Use Node.js 20

  - script: npm ci
    displayName: Install dependencies

  - script: npm test
    displayName: Run tests
